name: continuous-integration

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  tests:
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.11", "3.12", "3.13"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements-validation.txt
      - run: python -m pip install --upgrade pip setuptools wheel
      - run: python -m pip install -e ".[validation]"
      - run: python scripts/validate_metadata.py
      - run: python scripts/scan_release.py
      - run: python -m compileall -q src checker scripts tests
      - run: python -m unittest discover -s tests -v

  retained-evidence:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements-validation.txt
      - run: python -m pip install --upgrade pip setuptools wheel
      - run: python -m pip install -e ".[validation]"
      - run: python scripts/run_exact_falsification.py
      - run: python scripts/run_release_validation.py
